name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'App URL to load in WebView'
        required: false
        default: 'http://47.101.171.145/app'
        type: string
  push:
    branches: [main]
    paths:
      - 'apps/dsa-android/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Inject URL
        run: |
          APP_URL="${{ github.event.inputs.app_url || 'http://47.101.171.145/app' }}"
          sed -i "s|String APP_URL = \".*\";|String APP_URL = \"$APP_URL\";|g" \
            apps/dsa-android/app/src/main/java/com/dsa/app/MainActivity.java

      - name: Install SDK
        run: |
          echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>&1 || true
          echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>&1 || true

      - name: Generate wrapper
        run: |
          cd apps/dsa-android
          gradle wrapper --gradle-version 8.2

      - name: Build APK
        run: |
          cd apps/dsa-android
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          ./gradlew assembleRelease --no-daemon 2>&1 | tail -30

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dsa-app-release
          path: apps/dsa-android/app/build/outputs/apk/release/*.apk
          retention-days: 30
