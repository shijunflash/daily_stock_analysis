name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'App URL to load in WebView'
        required: false
        default: 'http://47.101.171.145/app'
        type: string
  push:
    paths:
      - 'apps/dsa-android/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dsa-android

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Inject App URL
        run: |
          APP_URL="${{ github.event.inputs.app_url || 'http://47.101.171.145/app' }}"
          sed -i "s|String APP_URL = \".*\";|String APP_URL = \"$APP_URL\";|g" \
            app/src/main/java/com/dsa/app/MainActivity.java

      - name: Build APK
        uses: digreatbrian/build-apk@v1.1
        with:
          working-directory: apps/dsa-android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dsa-app-release
          path: apps/dsa-android/app/build/outputs/apk/release/*.apk
          retention-days: 30
