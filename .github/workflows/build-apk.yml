name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'App URL to load in WebView'
        required: false
        default: 'http://47.101.171.145/app'
        type: string
  push:
    paths:
      - 'apps/dsa-android/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Inject App URL into source
        run: |
          if [ -n "${{ github.event.inputs.app_url }}" ]; then
            APP_URL="${{ github.event.inputs.app_url }}"
          else
            APP_URL="http://47.101.171.145/app"
          fi
          echo "Building with APP_URL=$APP_URL"
          sed -i "s|String APP_URL = \".*\";|String APP_URL = \"$APP_URL\";|g" \
            apps/dsa-android/app/src/main/java/com/dsa/app/MainActivity.java

      - name: Generate Gradle Wrapper
        run: |
          cd apps/dsa-android
          # Use gradle from setup-java to generate wrapper
          gradle wrapper --gradle-version=8.2
          chmod +x gradlew

      - name: Build APK (Release)
        run: |
          cd apps/dsa-android
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsa-app-release
          path: apps/dsa-android/app/build/outputs/apk/release/*.apk
          retention-days: 30
