name: Build Android APK

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      app_url:
        description: 'App URL to load in WebView'
        required: false
        default: 'http://47.101.171.145/app'
        type: string
  # 推送到 dsa-android 目录时自动触发
  push:
    paths:
      - 'apps/dsa-android/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Inject App URL into source
        run: |
          if [ -n "${{ github.event.inputs.app_url }}" ]; then
            APP_URL="${{ github.event.inputs.app_url }}"
          else
            APP_URL="http://47.101.171.145/app"
          fi
          echo "Building with APP_URL=$APP_URL"
          # Update the URL in MainActivity.java
          sed -i "s|String APP_URL = \".*\";|String APP_URL = \"$APP_URL\";|g" \
            apps/dsa-android/app/src/main/java/com/dsa/app/MainActivity.java

      - name: Grant execute permission for gradlew
        run: |
          # Generate gradle wrapper if not present
          cd apps/dsa-android
          if [ ! -f gradlew ]; then
            # Download gradle wrapper
            curl -sL "https://services.gradle.org/distributions/gradle-8.2-bin.zip" -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle
            /tmp/gradle/gradle-8.2/bin/gradle wrapper
          fi
          chmod +x gradlew

      - name: Build APK (Release)
        run: |
          cd apps/dsa-android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsa-app-release
          path: apps/dsa-android/app/build/outputs/apk/release/*.apk
          retention-days: 30
