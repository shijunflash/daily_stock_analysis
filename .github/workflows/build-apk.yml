name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'App URL to load in WebView'
        required: false
        default: 'http://47.101.171.145/app'
        type: string
  push:
    branches: [main]
    paths:
      - 'apps/dsa-android/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>&1 || true
          echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>&1 || true

      - name: Inject URL
        run: |
          APP_URL="${{ github.event.inputs.app_url || 'http://47.101.171.145/app' }}"
          sed -i "s|String APP_URL = \".*\";|String APP_URL = \"$APP_URL\";|g" \
            apps/dsa-android/app/src/main/java/com/dsa/app/MainActivity.java

      - name: Install Gradle
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          cd apps/dsa-android
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          gradle assembleRelease --no-daemon --stacktrace 2>&1
          echo "=== CHECKING APK ==="
          find /home -name "*.apk" 2>/dev/null
          find . -name "*.apk" 2>/dev/null
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs dir"

      - uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /opt/gradle-8.2/build.log
          retention-days: 7

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dsa-app-release
          path: |
            apps/dsa-android/app/build/outputs/apk/release/*.apk
            apps/dsa-android/app/build/outputs/**/*.apk
          retention-days: 30
