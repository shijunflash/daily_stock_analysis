name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'App URL to load in WebView'
        required: false
        default: 'http://47.101.171.145/app'
        type: string
  push:
    branches: [main]
    paths:
      - 'apps/dsa-android/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>&1 || true
          echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>&1 || true

      - name: Inject URL
        run: |
          APP_URL="${{ github.event.inputs.app_url || 'http://47.101.171.145/app' }}"
          sed -i "s|String APP_URL = \".*\";|String APP_URL = \"$APP_URL\";|g" \
            apps/dsa-android/app/src/main/java/com/dsa/app/MainActivity.java

      - name: Install Gradle
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.2/bin" >> $GITHUB_PATH
          gradle --version

      - name: Build APK
        run: |
          cd apps/dsa-android
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools"
          gradle assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
          echo "EXIT_CODE=$?"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dsa-app-release
          path: apps/dsa-android/app/build/outputs/apk/release/*.apk
          retention-days: 30
